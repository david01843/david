<html lang="en">
	<head>
		<meta charset="UTF-8" name="google" content="notranslate">
		<style>
			* {margin: 0; font-family: "Arial";}
			input {-webkit-appearance: none; position: absolute;
				width: 256px; height: 16px; top: 8px; left: 8px;
				outline: 1px solid black; outline-offset: -8px;}
			input::-webkit-slider-thumb {-webkit-appearance: none;
				width: 8px; height: 8px; background: var(--color);}
			input[type="range"] {--color: black;}
			input:hover {cursor: pointer;}
			canvas {width: 100%; height: 100%; z-index: -1;}
			.text {position: absolute; font-size: 12px; display: none;}
		</style>
	</head>
	<body>
		<input type="range" min="0" max="30" value="0"><canvas></canvas><p class="text"></p>
	</body>
	<script>
		// color
		const slide = document.querySelector("input")
		function setcolor() {
			if (slide.value == "0") {
				const color = "black"
				slide.style.outline = "1px solid black"; slide.style.setProperty("--color", "black")
				text.style.color = color; ctx.strokeStyle = color; ctx.fillStyle = color
				return
			}
			const h = slide.value/5; const l = .4; const c = 2*l; const x = c*(1-Math.abs((h%2)-1))
			let r, g, b
			if (h < 1) {r = c; g = x; b = 0} else if (h < 2) {r = x; g = c; b = 0}
			else if (h < 3) {r = 0; g = c; b = x} else if (h < 4) {r = 0; g = x; b = c}
			else if (h < 5) {r = x; g = 0; b = c} else {r = c; g = 0; b = x}
			const hex = (n) => {return Math.round(255*(n+l-c/2)).toString(16).padStart(2, "0")}
			const color = `#${hex(r)}${hex(g)}${hex(b)}`
			slide.style.outline = "1px solid "+color; slide.style.setProperty("--color", color)
			text.style.color = color; ctx.strokeStyle = color; ctx.fillStyle = color
		}
		slide.addEventListener("input", () => setcolor())
		
		// canvas
		const canvas = document.querySelector("canvas")
		const ctx = canvas.getContext("2d")
		window.addEventListener("load", () => {
			ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.font = "12px Arial"
		})
		const WIDTH = parseInt(getComputedStyle(canvas).width)
		const HEIGHT = parseInt(getComputedStyle(canvas).height)
		canvas.style.width = WIDTH; canvas.style.height = HEIGHT
		canvas.width = WIDTH; canvas.height = HEIGHT
		
		// write
		text = document.querySelector(".text")
		translation = ""
		function center_text() {
			const r = text.getBoundingClientRect()
			text.style.left = xy[0]-r.width/2; text.style.top = xy[1]-r.height/2
		}
		async function translate() {
			var x = [0, 0]
			for (let i of text.innerHTML.toLowerCase()) {
				if (/^[a-z]$/.test(i)) {x[0]++}
				else if (/^[а-яё]$/.test(i)) {x[1]++}
			}
			x = (x[0] > x[1]) ? ["en", "ru"] : ["ru", "en"]
			x = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${x[0]}&tl=${x[1]}&dt=t&q=${encodeURIComponent(text.innerHTML)}`)
			x = await x.json()
			translation = x[0][0][0]
		}
		window.addEventListener("keydown", async (e) => {
			if (e.key.length == 1) {
				text.innerHTML += e.key
				text.style.display = "block"
			} else if (e.key == "Backspace") {
				text.innerHTML = text.innerHTML.slice(0, -1)
			} else if (e.key == "Enter") {
				if (e.shiftKey) {
					await translate()
					ctx.fillText(text.innerHTML, xy[0], xy[1]+11)
					ctx.fillText(translation, xy[0], xy[1]-3)
				} else {
					ctx.fillText(text.innerHTML, xy[0], xy[1]+11)
				}
				
				text.innerHTML = ""
				text.style.display = "none"
				translation = ""
			} else if (e.key == "Escape") {
				text.innerHTML = ""
				text.style.display = "none"
			}
		})
		
		// draw, erase
		var drawmode = 0 // 0 = not drawing, 1 = draw, 2 = erase
		var drawtime = 0
		var xy = [0, 0]
		canvas.addEventListener("mousedown", () => {
			if (Date.now()-drawtime < 200) {
				drawmode = 2; ctx.globalCompositeOperation = "destination-out"; ctx.lineWidth = 64
			} else {
				drawmode = 1; ; ctx.lineWidth = 2
			}
			drawtime = Date.now()
		})
		canvas.addEventListener("mousemove", (e) => {
			xy = [e.clientX, e.clientY]
			if (drawmode == 1) {
				ctx.beginPath(); ctx.moveTo(xy[0], xy[1]);
				ctx.lineTo(xy[0]-e.movementX, xy[1]-e.movementY); ctx.stroke()
			} else if (drawmode == 2) {
				ctx.beginPath(); ctx.moveTo(xy[0], xy[1]);
				ctx.lineTo(xy[0]-e.movementX, xy[1]-e.movementY); ctx.stroke()
			}
			text.style.left = xy[0]; text.style.top = xy[1]
		})
		canvas.addEventListener("mouseup", () => {
			drawmode = 0; ctx.globalCompositeOperation = "source-over"
		})
	</script>
</html>

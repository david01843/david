<html lang="en"><!--https://htmlcolorcodes.com/color-names/-->
	<head>
		<meta charset="UTF-8" name="google" content="notranslate">
		<style>
			* {user-select: none;}
			body {
				display: grid; grid-template-rows: auto auto auto; margin: 2em 0;
				width: auto; height: auto; background-color: black;
				place-items: center; overscroll-behavior: contain;
			}
			p {font-family: "Arial"; margin: 0;}
			p:nth-of-type(1) {font-size: 4em; color: #FF6B35;}
			p:nth-of-type(2) {font-size: 20em; color: #4CAF50;}
			p:nth-of-type(3) {font-size: 10em; color: #4CAF50;}
		</style>
	</head>
	<body>
		<p>0</p><p>0</p><p>0</p>
		<audio src="beep1.mp3" preload="auto"></audio>
		<audio src="beep2.mp3" preload="auto"></audio>
	</body>
	<script>
		const ps = document.querySelectorAll("p")
		const as = document.querySelectorAll("audio")
		
		function setclock() {
			const t = new Date()
			const h = (t.getHours()%12).toString()//.padStart(2, "0")
			const m = t.getMinutes().toString().padStart(2, "0")
			const s = t.getSeconds().toString().padStart(2, "0")
			ps[0].innerHTML = `${h} : ${m} : ${s}`
			setTimeout(setclock, 100)
		}
		setclock()
		
		var v = [0, 0] // vertex
		var x0 = [0, 0] // x0, y0
		var setting = false
		var settime = 0
		var cp = 0 // cross product
		var dp = 0 // dot product
		var mp = 0 // magnitude product
		var t = 0 // theta
		var timer = 0
		var counter = 0
		var counttimeout = null
		
		function countdown() {
			if (ps[1].innerHTML == "0.1") {
				ps[1].innerHTML = timer.toFixed(1)
				counter += 1; ps[2].innerHTML = counter
				counter%5 ? as[0].play() : as[1].play()
			} else {
				ps[1].innerHTML = (ps[1].innerHTML-.1).toFixed(1)
			}
			counttimeout = setTimeout(countdown, 100)
		}
		window.addEventListener("mousedown", (e) => {
			as[0].load(); as[1].load()
			v = [e.clientX, e.clientY]
			x0 = [e.clientX, e.clientY]
			setting = true; settime = 0; ps[1].innerHTML = 0; counter = 0; ps[2].innerHTML = 0
			clearTimeout(counttimeout)
		})
		window.addEventListener("touchstart", (e) => {
			as[0].load(); as[1].load()
			v = [e.touches[0].clientX, e.touches[0].clientY]
			x0 = [e.touches[0].clientX, e.touches[0].clientY]
			setting = true; settime = 0; ps[1].innerHTML = 0; counter = 0; ps[2].innerHTML = 0
			clearTimeout(counttimeout)
		})
		window.addEventListener("mousemove", (e) => {
			if (setting) {
				cp = (x0[0]-v[0])*(e.clientY-v[1])-(x0[1]-v[1])*(e.clientX-v[0])
				dp = (x0[0]-v[0])*(e.clientX-v[0])+(x0[1]-v[1])*(e.clientY-v[1])
				mp = Math.hypot(x0[0]-v[0], x0[1]-v[1])
				mp *= Math.hypot(e.clientX-v[0], e.clientY-v[1])
				t = Math.sign(cp)*Math.acos(dp/mp)
				if (!isNaN(t)) settime = Math.max(settime+t, 0)
				ps[1].innerHTML = ~~settime
			}
			x0 = [e.clientX, e.clientY]
		})
		window.addEventListener("touchmove", (e) => {
			if (setting && e.touches[0]) {
				cp = (x0[0]-v[0])*(e.touches[0].clientY-v[1])-(x0[1]-v[1])*(e.touches[0].clientX-v[0])
				dp = (x0[0]-v[0])*(e.touches[0].clientX-v[0])+(x0[1]-v[1])*(e.touches[0].clientY-v[1])
				mp = Math.hypot(x0[0]-v[0], x0[1]-v[1])
				mp *= Math.hypot(e.touches[0].clientX-v[0], e.touches[0].clientY-v[1])
				t = Math.sign(cp)*Math.acos(dp/mp)
				if (!isNaN(t)) settime = Math.max(settime+4*t, 0)
				ps[1].innerHTML = ~~settime
			}
			x0 = [e.touches[0].clientX, e.touches[0].clientY]
		})
		window.addEventListener("mouseup", () => {
			setting = false; timer = ~~settime; counter = 0
			if (timer > 1) counttimeout = setTimeout(countdown, 100)
		})
		window.addEventListener("touchend", () => {
			setting = false; timer = ~~settime; counter = 0
			if (timer > 1) counttimeout = setTimeout(countdown, 100)
		})
	</script>
</html>

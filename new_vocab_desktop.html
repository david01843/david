<html lang="en"><!--https://colorscheme.ru/html-colors.html-->
	<head>
		<meta charset="UTF-8" name="google" content="notranslate">
	</head>
	<style>
		* {font-family: sans-serif; user-select: none; margin: 0;}
		body {display: flex; flex-direction: column; align-items: center;}
		#prompt {margin-top: 32px; font-size: 32px; height: 32px; color: gray;}
		#answer {margin-top: 16px; font-size: 64px; height: 64px; color: black;}
		#words, #lists, #pages {font-size: 12px;}
		#words {margin-top: 64px; display: grid; grid-template-rows: repeat(10, auto); grid-auto-flow: column; grid-gap: 2px;}
		#words p {width: 24px; height: 24px; line-height: 24px; text-align: center; background-color: #eee;}
		#words p.active {background-color: #bce;}
		#lists p, #pages p {display: inline-block; padding: 2px 8px; margin: 0 2px;}
		#lists p {background-color: #adb; margin-top: 16px;}
		#pages p {background-color: #dbb; margin-top: 4px;}
	</style>
	<body><p id="prompt"></p><p id="answer"></p><div id="words"></div><div id="lists"></div><div id="pages"></div></body>
	<script src="a1a2db.js"></script>
	<script>
		const prompt = document.querySelector("#prompt")
		const answer = document.querySelector("#answer")
		const words = document.querySelector("#words")
		const lists = document.querySelector("#lists")
		const pages = document.querySelector("#pages")
		
		const chars = "ё1234567890-=йцукенгшщзхъ\\фывапролджэячсмитьбю,"
		const codes = [192, 49, 50, 51, 52, 53, 54, 55, 56, 57, 48, 189, 187, 81, 87, 69, 82, 84, 89, 85, 73, 79, 80, 219, 221, 220, 65, 83, 68, 70, 71, 72, 74, 75, 76, 186, 222, 90, 88, 67, 86, 66, 78, 77, 188, 190, 191]
		var audio = new SpeechSynthesisUtterance() // requires Google Chrome, not Vanadium
		audio.lang = "ru"
		var mousedown = false
		var current = null
		
		function flip(e) {mousedown = true; e.target.classList.toggle("active")}
		function check() {
			if (answer.innerHTML == answer.dataset.metadata) {
				answer.style.color = "limegreen"
				speechSynthesis.speak(audio)
			} else if (answer.innerHTML != answer.dataset.metadata.slice(0, answer.innerHTML.length)) {
				answer.style.color = "red"
			} else {
				answer.style.color = "black"
			}
		}
		function cycle() {
			speechSynthesis.cancel()
			let x = Array.from(document.querySelectorAll("#words p.active"))
			if (x.length == 0) {
				prompt.innerHTML = ""
				answer.dataset.metadata = ""
				audio.text = ""
				current = null
			} else if (x.length > 0) {
				x.sort(() => Math.random()-.5)
				x = (x.length > 1 && x[0] == current) ? x[1] : x[0]
				prompt.innerHTML = x.dataset.metadata.split("|")[0]//innerHTML
				answer.dataset.metadata = x.dataset.metadata.split("|")[1]
				audio.text = x.dataset.metadata.split("|")[1]
				current = x
			}
			answer.innerHTML = ""
			answer.style.color = "black"
		}
		document.addEventListener("keydown", (e) => {
			if (codes.includes(e.keyCode)) {answer.innerHTML += chars[codes.indexOf(e.keyCode)]; check()}
			else if (e.keyCode == 8) {answer.innerHTML = answer.innerHTML.slice(0, -1); check()}
			else if (e.keyCode == 13) {
				if (answer.style.color == "limegreen") {
					if (e.shiftKey) current.classList.remove("active")
					cycle()
				}
				else {answer.innerHTML = answer.dataset.metadata; check()}
			}
			else if (e.keyCode == 32) {answer.innerHTML += " "; check()}
		})
		document.addEventListener("mouseup", (e) => {mousedown = false})
		
		for (let i in all_data) { // i = list name
			let x = []
			for (let j in all_data[i]) {
				let y = all_data[i][parseInt(j)]
				x.push(y["t"]+"|"+y["0"]+(y["1sn"] || y["1ma"] || y["inf"] || ""))
			}
			x.sort(() => Math.random()-.5)
			let n = Math.ceil(x.length/999) // number of pages for 10 rows, max 4 columns
			let a = document.createElement("p") // list
			a.innerHTML = i
			a.addEventListener("click", () => {
				pages.innerHTML = ""
				for (let j = 0; j < n; j++) {
					let z = x.splice(-Math.ceil(all_data[i].length/n))
					let b = document.createElement("p") // page
					b.innerHTML = `page ${j+1}`
					b.addEventListener("click", () => {
						words.innerHTML = ""
						words.style.gridTemplateColumns = `repeat(${Math.ceil(z.length/10)}, auto)`
						for (let k of z) {
							let c = document.createElement("p") // word
							//c.innerHTML = k.split("|")[0]
							c.dataset.metadata = k//.split("|")[1]
							c.classList.add("active")
							c.addEventListener("mousedown", flip)
							c.addEventListener("mouseenter", (e) => {if (mousedown) {flip(e)}})
							words.appendChild(c)
						}
						cycle()
					})
					pages.appendChild(b)
				}
				document.querySelector("#pages p").click()
			})
			lists.appendChild(a)
		}
	</script>
</html>

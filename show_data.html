			p {margin: 0;}

	<body></body>
	<script src="a1a2db.js"></script>
	<script>
		b = document.querySelector("body")
		function pp(txt) {
			p = document.createElement("p")
			p.innerHTML = txt
			b.appendChild(p)
		}
		for (let i in all_data) {
			pp("-")
			pp("----"+i+"----------------------------------------------------------------")
			for (let j in all_data[i]) {
				let y = all_data[i][parseInt(j)]
				pp(`${y["t"]} -- ${y["0"]+(y["1sn"] || y["1ma"] || y["inf"] || "")}`)
			}
		}
	</script>

<html lang="en"><!--https://htmlcolorcodes.com/color-names/-->
	<head>
		<meta charset="UTF-8" name="google" content="notranslate">
		<style>
			* {margin: 0; font-family: monospace; color: white;}
			body {
				display: grid; background-color: black;
				grid-template-rows: auto auto 1fr 1fr auto;
				grid-template-columns: 1fr 1fr;
			}
			div {
				background-color: red; width: 64px; height: 64px;
				border-radius: 16px; margin: 8px auto;
			}
			div:nth-of-type(1) {grid-row: 1; grid-column: 1 / 3;}
			div:nth-of-type(2) {grid-row: 5; grid-column: 1 / 3;}
			h1 {
				grid-row: 2; grid-column: 1 / 3;
				font-size: 128px; text-align: center;
				border-bottom: 1px solid white;
			}
			h2 {display: flex; justify-content: center; align-items: center;}
			h2:nth-of-type(1) {grid-row: 3; grid-column: 1;}
			h2:nth-of-type(2) {grid-row: 3; grid-column: 2;}
			h2:nth-of-type(3) {grid-row: 4; grid-column: 1; border-bottom: 1px solid white;}
			h2:nth-of-type(4) {grid-row: 4; grid-column: 2; border-bottom: 1px solid white;}
			h3 {position: absolute; font-size: 128px;}
		</style>
	</head>
	<body>
		<div></div>
		<h1>00:00</h1>
		<h2>-10</h2><h2>+10</h2><h2>-2</h2><h2>+2</h2>
		<h3>0</h3>
		<div></div>
	</body>
	<script>
		const divs = document.querySelectorAll("div")
		const h1 = document.querySelector("h1")
		const h2s = document.querySelectorAll("h2")
		const h3 = document.querySelector("h3")
		
		const p = h2s[3].getBoundingClientRect()
		const _ = h3.getBoundingClientRect()
		h3.style.left = `${p.x-_.width/2}px`
		h3.style.top = `${p.y-_.height/2}px`
		
		var time = Date.now()
		divs[0].addEventListener("click", () => {
			time = Date.now()
			h1.innerHTML = `00:00`
		})
		function tick() {
			const t = Math.floor((Date.now()-time)/1000)
			const m = Math.floor(t/60).toString().padStart(2, '0')
			const s = (t%60).toString().padStart(2, '0')
			h1.innerHTML = `${m}:${s}`
			setTimeout(tick, 1000)
		}
		tick()
		
		var counter = 0
		function setcounter() {
			h3.innerHTML = `${counter}`
			h3.style.left = `${p.x-h3.getBoundingClientRect().width/2}px`
		}
		divs[1].addEventListener("click", () => {counter = 0; setcounter()})
		h2s[0].addEventListener("click", () => {counter -= 10; setcounter()})
		h2s[1].addEventListener("click", () => {counter += 10; setcounter()})
		h2s[2].addEventListener("click", () => {counter -= 2; setcounter()})
		h2s[3].addEventListener("click", () => {counter += 2; setcounter()})
	</script>
</html>

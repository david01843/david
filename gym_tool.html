<html lang="en"><!--https://htmlcolorcodes.com/color-names/-->
	<head>
		<meta charset="UTF-8" name="google" content="notranslate">
		<style>
			* {margin: 8px; font-family: monospace;}
			body {background-color: black;}
			h1, h2 {position: absolute; text-align: center; left: 0; right: 0;}
			h1 {font-size: 256px; color: yellow; top: 0;}
			h2 {font-size: 256px; color: gray; bottom: 0;}
		</style>
	</head>
	<body>
		<h1>0:00</h1>
		<h2>00:00</h2>
	</body>
	<script>
		const body = document.querySelector("body")
		const h1 = document.querySelector("h1")
		const h2 = document.querySelector("h2")
		
		var seconds = 0
		var newtimer = false
		function settimer() {
			seconds += 1
			const m = (~~(seconds / 60)%10).toString()
			const s = (seconds%60).toString().padStart(2, "0")
			h1.innerHTML = `${m}:${s}`
			setTimeout(() => {if (!newtimer) settimer()}, 1000)
		}
		body.addEventListener("click", () => {
			seconds = 0
			newtimer = true
			h1.style.color = "black"
			h1.innerHTML = "0:00"
			setTimeout(() => {h1.style.color = "yellow"}, 100)
			setTimeout(() => {newtimer = false; settimer()}, 1000)
		})
		
		function setclock() {
			const t = new Date()
			const h = t.getHours().toString().padStart(2, "0")
			const m = t.getMinutes().toString().padStart(2, "0")
			const s = t.getSeconds().toString().padStart(2, "0")
			h2.innerHTML = `${h}:${m}:${s}`
			setTimeout(setclock, 1000)
		}
		setclock()
	</script>
</html>
